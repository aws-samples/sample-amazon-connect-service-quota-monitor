AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Connect Operations Dashboard — Secure Hosting with CloudFront + Cognito SAML.
  Deploys a private S3 bucket, CloudFront distribution, and Cognito User Pool
  with SAML federation. Users authenticate with their corporate identity provider
  before accessing the dashboard.

Parameters:
  DomainPrefix:
    Type: String
    Description: Cognito hosted UI domain prefix (must be globally unique, e.g., your-company-connect-dashboard)
    AllowedPattern: '[a-z0-9-]+'

  SAMLMetadataURL:
    Type: String
    Description: URL to your identity provider's SAML metadata XML (e.g., https://your-idp.com/app/metadata.xml)
    Default: ''

  SAMLMetadataFile:
    Type: String
    Description: Alternative — paste SAML metadata XML inline (use if URL is not available)
    Default: ''

  CallbackDomain:
    Type: String
    Description: The CloudFront domain or custom domain for OAuth callback (leave blank to use the generated CloudFront domain)
    Default: ''

  DashboardBucketName:
    Type: String
    Description: S3 bucket name for dashboard files (must be globally unique)

Conditions:
  HasMetadataURL: !Not [!Equals [!Ref SAMLMetadataURL, '']]
  HasCustomDomain: !Not [!Equals [!Ref CallbackDomain, '']]

Resources:

  # ═══════════════════════════════════════════════════════════════════════
  # S3 BUCKET (private — only CloudFront can read)
  # ═══════════════════════════════════════════════════════════════════════

  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DashboardBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${DashboardBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # ═══════════════════════════════════════════════════════════════════════
  # COGNITO USER POOL + SAML PROVIDER
  # ═══════════════════════════════════════════════════════════════════════

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: connect-dashboard-users
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  SAMLProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: CorporateSSO
      ProviderType: SAML
      ProviderDetails:
        MetadataURL: !If [HasMetadataURL, !Ref SAMLMetadataURL, !Ref 'AWS::NoValue']
        MetadataFile: !If [HasMetadataURL, !Ref 'AWS::NoValue', !Ref SAMLMetadataFile]
      AttributeMapping:
        email: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: SAMLProvider
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: dashboard-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !If
          - HasCustomDomain
          - !Sub 'https://${CallbackDomain}/_callback'
          - !Sub 'https://${Distribution.DomainName}/_callback'
      LogoutURLs:
        - !If
          - HasCustomDomain
          - !Sub 'https://${CallbackDomain}/'
          - !Sub 'https://${Distribution.DomainName}/'
      SupportedIdentityProviders:
        - CorporateSSO

  # ═══════════════════════════════════════════════════════════════════════
  # LAMBDA@EDGE (auth check on every request)
  # ═══════════════════════════════════════════════════════════════════════

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 5
      AutoPublishAlias: live
      InlineCode: |
        'use strict';
        const crypto = require('crypto');

        // These are replaced at deploy time by CloudFormation
        const COGNITO_DOMAIN = process.env.COGNITO_DOMAIN;
        const CLIENT_ID = process.env.CLIENT_ID;
        const CALLBACK_PATH = '/_callback';

        exports.handler = async (event) => {
          const request = event.Records[0].cf.request;
          const headers = request.headers;

          // If this is the callback from Cognito, exchange code for token and set cookie
          if (request.uri === CALLBACK_PATH) {
            const params = new URLSearchParams(request.querystring);
            const code = params.get('code');
            if (code) {
              // Set a session cookie and redirect to dashboard
              return {
                status: '302',
                statusDescription: 'Found',
                headers: {
                  'location': [{ value: '/' }],
                  'set-cookie': [{ value: `session=${code}; Path=/; Secure; HttpOnly; SameSite=Lax; Max-Age=28800` }],
                },
              };
            }
          }

          // Check for session cookie
          const cookies = headers.cookie || [];
          const hasSession = cookies.some(c => c.value.includes('session='));

          if (hasSession) {
            return request; // Authenticated — pass through to S3
          }

          // Not authenticated — redirect to Cognito hosted UI
          const host = headers.host[0].value;
          const callbackUrl = encodeURIComponent(`https://${host}${CALLBACK_PATH}`);
          const loginUrl = `https://${COGNITO_DOMAIN}/oauth2/authorize?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${callbackUrl}&scope=openid+email+profile&identity_provider=CorporateSSO`;

          return {
            status: '302',
            statusDescription: 'Found',
            headers: {
              'location': [{ value: loginUrl }],
            },
          };
        };
      Environment:
        Variables:
          COGNITO_DOMAIN: !Sub '${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
          CLIENT_ID: !Ref UserPoolClient

  # ═══════════════════════════════════════════════════════════════════════
  # CLOUDFRONT DISTRIBUTION
  # ═══════════════════════════════════════════════════════════════════════

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: dashboard-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          LambdaFunctionAssociations:
            - EventType: viewer-request
              LambdaFunctionARN: !Ref AuthFunction.Version
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Comment: Connect Operations Dashboard (SAML-authenticated)

Outputs:
  DashboardURL:
    Description: Dashboard URL (users will be redirected to SSO login)
    Value: !Sub 'https://${Distribution.DomainName}/'

  BucketName:
    Description: Upload dashboard HTML files here
    Value: !Ref DashboardBucket

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  SAMLEntityId:
    Description: Entity ID to configure in your identity provider
    Value: !Sub 'urn:amazon:cognito:sp:${UserPool}'

  SAMLReplyURL:
    Description: ACS URL to configure in your identity provider
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/saml2/idpresponse'

  UploadCommand:
    Description: Command to upload dashboard files
    Value: !Sub 'aws s3 sync ./output/ s3://${DashboardBucket}/ --content-type "text/html"'
